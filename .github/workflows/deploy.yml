# ==================================================================================
# WORKFLOW DE DEPLOYMENT - PIPELINE DE PRODUCCIÓN
# ==================================================================================
# Este workflow es el FINAL de la cadena CI/CD. Se ejecuta SOLO cuando el código
# llega a la rama 'main' (rama de producción).
#
# CONCEPTO: "Continuous Deployment (CD)" - Deployment automático a producción.
# Si el código pasó CI (testing + linting), está listo para users finales.
# Este workflow:
# 1. Ejecuta tests UNA VEZ MÁS (defense in depth = múltiples verificaciones)
# 2. Crea un "build artifact" (código compilado/empaquetado)
# 3. Sube el artefacto a GitHub (descargable, rastreable)
# 4. Prepara logs para auditoría (quién deployó qué, cuándo)
#
# RAZÓN PARA SOLO "main": En desarrollo, queremos fast feedback (test rápidamente).
# En producción, queremos máxima seguridad (verificaciones extra, artifacts guardados).
# ==================================================================================

name: Deploy

# ================================================================================
# TRIGGER: SOLO en 'main' (rama de producción)
# ================================================================================
# RAZÓN por no incluir 'develop', 'feature/**', 'release/**':
# - develop: Es WIP (work in progress), no lista para usuarios
# - feature/**: Es experimental, podría no tener tests completos
# - release/**: Se mergea a main cuando está lista, no necesita deployment separado
#
# "Main-only deployment" es estándar en industria:
# - Google: Deployments automáticos solo desde main branch
# - Netflix: Canary deployments desde main (controla quién ve qué)
# - GitHub/Microsoft: Feature flags en production (deploy a main, activar después)
#
# BENEFICIO: Garantiza que SOLO código probado y aprobado llega a producción.
on:
  push:
    branches:
      - main

# ================================================================================
# JOBS: El trabajo de deployment
# ================================================================================
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ====================================================================
      # PASO 1: Obtener el código
      # ====================================================================
      - name: Checkout code
        uses: actions/checkout@v4

      # ====================================================================
      # PASO 2: Configurar Python
      # ====================================================================
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          # En deploy usamos versión específica (3.11) para reproducibilidad.
          # El código fue testeado con 3.9, 3.10, 3.11 en el workflow de testing.
          # Deployamos con 3.11 (la más reciente, mejor rendimiento).
          python-version: '3.11'

      # ====================================================================
      # PASO 3: Instalar dependencias
      # ====================================================================
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ====================================================================
      # PASO 4: EJECUTAR TESTS DE NUEVO (Defense in Depth)
      # ====================================================================
      # CONCEPTO CRÍTICO: "Defense in Depth" = Múltiples capas de protección.
      #
      # Ya sabemos que los tests pasaron en el PR (testing.yml), pero
      # entre ese momento y ahora, alguien podría haber hecho cambios
      # (aunque GitHub debería prevenir esto si CI requerido pasa).
      #
      # Ejecutar tests aquí ES PARANOIA pero BUENA paranoia:
      # "Assume everything is broken until proven otherwise"
      #
      # 'continue-on-error: false' = SI UN TEST FALLA, EL DEPLOYMENT SE DETIENE.
      # Esto es DIFERENTE al workflow de testing (donde es true para codecov).
      # RAZÓN: En deploy, no queremos que NADA se suba si algo está roto.
      # Si un test falla:
      # 1. El workflow termina (ROJO)
      # 2. Los developers ven el error inmediatamente
      # 3. No se crea artifact, no se sube nada
      # 4. Usuarios NO ven código roto
      #
      # FLAGS:
      # - '--cov-report=term-missing': Muestra en terminal qué líneas NO están testeadas
      #   (más conciso que HTML para logs de CI, pero suficiente para alertas)
      - name: Run tests
        run: |
          pytest tests/ -v --cov=src --cov-report=term-missing
        continue-on-error: false

      # ====================================================================
      # PASO 5: Chequeos de calidad de código (soft fail)
      # ====================================================================
      # Aquí corremos linting de nuevo, pero con 'continue-on-error: true'
      # RAZÓN: Si hay un warning de estilo (línea 130 caracteres vs 127),
      # NO queremos bloquear todo el deployment.
      #
      # FILOSOFÍA:
      # - Tests (comportamiento): BLOQUEA si falla (continue-on-error: false)
      # - Linting (estilo): ADVIERTE si falla (continue-on-error: true)
      #
      # En empresas grandes, el equipo de DevOps decide esto:
      # - Startups: Linting soft (rápido a producción)
      # - Bancos: Linting hard (máxima calidad)
      # Este ejemplo usa soft, preparando para escalabilidad.
      - name: Run code quality checks
        run: |
          flake8 src tests --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
        continue-on-error: true

      # ====================================================================
      # PASO 6: Crear Build Artifact
      # ====================================================================
      # CONCEPTO: "Build Artifact" = Código listo para producción, empaquetado.
      #
      # ¿QUÉ CONTIENE?
      # - src/: El código fuente (lógica de la aplicación)
      # - requirements.txt: Dependencias (qué necesita para correr)
      # - README.md: Documentación (cómo usar)
      #
      # ¿POR QUÉ ES IMPORTANTE?
      # 1. RASTREABILIDAD: Ese artifact está vinculado a un commit específico
      #    (Si hay un bug en producción, sabemos EXACTAMENTE qué versión es)
      # 2. REPRODUCIBILIDAD: Alguien puede descargar el artifact en 6 meses
      #    e instalarlo/ejecutarlo igual que hoy
      # 3. AUDITORÍA: Logs legales/compliance (quién deployó qué en qué fecha)
      # 4. ROLLBACK: Si algo falla en producción, volvemos a versión anterior
      #    (el artifact antiguo sigue disponible)
      #
      # CASOS DE USO REALES:
      # - Banco encuentra un bug en versión X, necesita saber qué cambios la causaron
      #   → Descargan artifact de X y Y, comparan
      # - Cliente dice "en Junio funcionaba, ahora no"
      #   → Ingeniero descarga artifact de Junio, reproduce el problema
      #
      # En producción REAL (no educativo):
      # Este artifact se subiría a AWS S3, Google Cloud Storage, Docker Registry, etc.
      - name: Create build artifact
        run: |
          # mkdir -p build: Crea carpeta 'build/' (p = no error si existe)
          mkdir -p build
          # Copia carpeta completa src/ a build/src/
          cp -r src build/
          # Copia archivo requirements.txt (qué versiones de librerías)
          cp requirements.txt build/
          # Copia README.md (documentación)
          cp README.md build/
          # Muestra confirmación
          echo "Build artifact created successfully"

      # ====================================================================
      # PASO 7: Subir Artifact a GitHub
      # ====================================================================
      # GitHub permite "artifacts" = archivos resultado de un workflow.
      # Se guardan 30 días por defecto (configurable).
      #
      # ¿DÓNDE SE GUARDAN?
      # En la interfaz de GitHub: Actions → [workflow] → [run] → Artifacts
      # Desarrolladores pueden descargar el artifact (ej: code review, testing)
      #
      # RAZONES PARA SUBIR:
      # 1. HISTÓRICO: Cada versión deployada queda registrada
      # 2. DEBUGGING: Si hay bug, ingeniero descarga artifact de esa fecha
      # 3. COMPLIANCE: Auditoría quiere prueba de qué se deployó
      # 4. ROLLBACK: Si producción falla, IT descarga artifact anterior
      #
      # FLAGS:
      # - 'name': Nombre único para este artifact (axanet-cliente-manager)
      #   Permite distinguir si hay múltiples builds en un día
      # - 'path': Carpeta a comprimir (build/)
      #   GitHub la zipea automáticamente
      # - 'retention-days: 30': Guardar durante 30 días
      #   RAZÓN: Almacenamiento cuesta dinero. 30 días es balance
      #   (suficiente para debugging, no infinito para no quebrar el presupuesto)
      #
      # EN PRODUCCIÓN REAL:
      # Los artifacts de GitHub Actions se usan para:
      # - Builds pequeños (código Python, scripts)
      # - Docker images se suben a registros (ECR, Docker Hub)
      # - Binarios grandes se suben a S3/Azure Blob
      # Este ejemplo usa artifacts GitHub porque es educativo y gratuito.
      - name: Upload build artifact
        uses: actions/upload-artifact@v3
        with:
          name: axanet-cliente-manager
          path: build/
          retention-days: 30

      # ====================================================================
      # PASO 8: Resumen de Deployment
      # ====================================================================
      # Información visual sobre lo que se acaba de hacer.
      # En producción real, esto se enviaría a Slack, email, dashboard, etc.
      # Los estudiantes ven:
      # ✓ Tests pasaron (código funciona)
      # ✓ Linting pasó (código está limpio)
      # ✓ Artifact creado (versión guardada)
      # ✓ Listo para producción (confianza)
      - name: Deployment summary
        run: |
          echo "Deployment Summary"
          echo "=================="
          echo "✓ All tests passed"
          echo "✓ Code quality verified"
          echo "✓ Build artifact created"
          echo "✓ Ready for production deployment"

# ================================================================================
# RESUMEN: Cómo funciona el Pipeline Completo (Clase 6)
# ================================================================================
# 1. Desarrollador hace: git push feature/new-feature
#    → GitHub Actions inicia: testing.yml + lint.yml (EN PARALELO)
#    → Si ALGUNO falla: PR marcado ROJO, no se puede mergear
#    → Si TODO pasa: PR marcado VERDE, se puede mergear
#
# 2. Desarrollador hace: git push main (o mergea PR a main)
#    → GitHub Actions inicia: deploy.yml
#    → Tests + Linting se ejecutan de nuevo (verificación final)
#    → Si TODO pasa: Artifact se crea y sube
#    → Badge VERDE aparece en main
#    → Código está en producción
#
# 3. Si algo falla en deploy:
#    → Badge ROJO en main
#    → Código NO sube a producción
#    → Desarrolladores ven el error y lo arreglan
#    → Hacen push de fix a main
#    → Deploy reintenta automáticamente
#
# BENEFICIO PEDAGÓGICO:
# Los estudiantes entienden TODA la cadena CI/CD:
# - Continuous Integration = Testing automático en feature branches
# - Continuous Delivery = Build artifact listo pero sin deployar
# - Continuous Deployment = Deploy automático cuando main se actualiza
#
# RESPONSABILIDADES:
# Desarrollador: "Escribo código y hago push"
# GitHub Actions: "Verifica, testa, compila, empaqueta, sube artifact"
# Humanos: Descargan artifact o IT lo despliega a AWS/Azure/On-Prem
#
# La máquina hace el trabajo sucio (repetitivo, error-prone).
# Los humanos toman decisiones (¿realmente queremos este cambio?).
# ===============================================================================
