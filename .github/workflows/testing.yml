# ==================================================================================
# WORKFLOW DE TESTING - INTEGRACIÓN CONTINUA (CI)
# ==================================================================================
# Este workflow implementa TESTING AUTOMÁTICO cada vez que se hace push o pull request.
# Es uno de los pilares de la Integración Continua: ejecutar automáticamente todas las
# pruebas para garantizar que el código nuevo no rompa funcionalidades existentes.
#
# CONCEPTO CLAVE: "Fail Fast" - Detectar problemas lo antes posible en el ciclo de
# desarrollo, antes de que lleguen a producción.
# ==================================================================================

name: Testing

# ================================================================================
# SECCIÓN 'on': Define CUÁNDO se dispara este workflow automáticamente
# ================================================================================
on:
  # ============================================================================
  # PUSH: Se ejecuta cuando se hace 'git push' a estas ramas específicas
  # ============================================================================
  push:
    branches:
      # La rama 'main' es la rama de producción. Cada cambio debe ser testeado.
      - main
      # La rama 'develop' es donde se integran todas las características nuevas.
      # Testing aquí previene que código roto llegue a 'main'.
      - develop
      # 'feature/**' permite que CUALQUIER rama que comience con 'feature/'
      # (ej: feature/new-login, feature/api-integration) sea testeada automáticamente.
      # Esto permite que desarrolladores trabajen en ramas independientes y confirmar
      # que su trabajo no rompe nada antes de hacer un PR.
      - 'feature/**'
      # 'release/**' son ramas de preparación para liberar a producción.
      # Testing adicional aquí es crítico porque la calidad en release es crucial.
      - 'release/**'

  # ============================================================================
  # PULL_REQUEST: Se ejecuta cuando se abre o actualiza un PR
  # ============================================================================
  # Los PRs son momentos críticos: el código está a punto de ser integrado.
  # Testing aquí actúa como "puerta de calidad" que bloquea PRs si algo falla.
  pull_request:
    branches:
      # Solo queremos bloquear PRs que se dirijan a 'main' y 'develop'
      # (son las ramas importantes). PRs a feature branches pueden ignorarse.
      - main
      - develop

# ================================================================================
# JOBS: Define el TRABAJO que se ejecutará (pueden ser paralelos)
# ================================================================================
jobs:
  test:
    # Ejecutar en la última versión de Ubuntu disponible
    # GitHub proporciona máquinas virtuales Linux gratuitas para GitHub Actions
    runs-on: ubuntu-latest

    # ========================================================================
    # STRATEGY.MATRIX: Matriz de Pruebas - Ejecución MULTI-VERSIÓN
    # ========================================================================
    # CONCEPTO CLAVE: La compatibilidad con múltiples versiones es crítica.
    # Si solo testeamos con Python 3.11, no sabemos si el código funciona
    # en Python 3.9 (usuarios que aún no actualizan) o 3.10 (otros sistemas).
    # La matriz ejecuta TODAS las pruebas con TODAS las versiones = 3 ejecuciones.
    #
    # RAZONES ESPECÍFICAS:
    # - Python 3.9: Usuarios con sistemas más antiguos (LTS, compatibilidad)
    # - Python 3.10: Versión intermedia (muchos usuarios la usan)
    # - Python 3.11: Última versión estable (características nuevas, mejor rendimiento)
    #
    # BENEFICIO: Si el código falla en 3.10, lo sabemos ANTES de que un usuario
    # lo descubra en producción.
    # ========================================================================
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
      # ====================================================================
      # PASO 1: Obtener el código fuente
      # ====================================================================
      # Descarga el repositorio completo en la máquina virtual de GitHub.
      # Necesario porque el trabajo se ejecuta en una máquina limpia (sin código).
      - name: Checkout code
        uses: actions/checkout@v4

      # ====================================================================
      # PASO 2: Configurar Python
      # ====================================================================
      # Instala la versión específica de Python según la matriz.
      # ${{ matrix.python-version }} se reemplaza con 3.9, luego 3.10, luego 3.11.
      # GitHub Actions gestiona múltiples versiones de Python automáticamente.
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      # ====================================================================
      # PASO 3: Instalar dependencias del proyecto
      # ====================================================================
      # El código Python depende de librerías externas (pytest, pytest-cov, etc).
      # 'pip install --upgrade pip' mantiene pip actualizado (mejor compatibilidad).
      # 'pip install -r requirements.txt' instala TODAS las dependencias listadas.
      # Esto replica exactamente el entorno en el que se desarrolló el código.
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # ====================================================================
      # PASO 4: Ejecutar pruebas unitarias con cobertura
      # ====================================================================
      # PYTEST: Marco de pruebas que busca tests/ y los ejecuta.
      #
      # FLAGS EXPLICADOS:
      # - '-v' (verbose): Muestra cada test individual (no solo resumen)
      # - '--cov=src': Mide cobertura de código en carpeta 'src'
      #   CONCEPTO: Cobertura = qué % del código es ejecutado por tests.
      #   Si cobertura es 50%, significa que el 50% del código tiene pruebas.
      #   Cobertura alta = menos bugs sorpresas en producción.
      # - '--cov-report=xml': Genera reporte XML para upload a codecov (análisis)
      # - '--cov-report=html': Genera reporte HTML bonito para revisar manualmente
      #   (útil para desarrolladores: ven exactamente qué líneas NO están testeadas)
      - name: Run tests with pytest
        run: |
          pytest tests/ -v --cov=src --cov-report=xml --cov-report=html

      # ====================================================================
      # PASO 5: Subir reportes de cobertura a Codecov
      # ====================================================================
      # Codecov.io es una plataforma que:
      # 1. Recolecta datos de cobertura de múltiples lenguajes
      # 2. Genera tendencias históricas (ej: cobertura sube/baja semana a semana)
      # 3. Comenta en PRs: "Buenas noticias: cobertura subió 2%"
      # 4. Bloquea PRs si cobertura baja demasiado (control de calidad)
      #
      # 'continue-on-error: true' = Si Codecov no responde (problema de red),
      # el workflow NO falla. Es una herramienta "nice-to-have", no crítica.
      # Si marcáramos false y Codecov cae, todos los PRs se bloquearían
      # (Denial of Service no intencional).
      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          name: codecov-umbrella
        continue-on-error: true

      # ====================================================================
      # PASO 6: Mostrar resumen de cobertura
      # ====================================================================
      # Información visual sobre dónde están los reportes de cobertura.
      # El reporte HTML (htmlcov/index.html) es útil para análisis local:
      # desarrolladores pueden descargarlo y verlo en su navegador.
      - name: Display coverage summary
        run: |
          echo "Coverage Report Generated"
          echo "=========================="
          if [ -f htmlcov/index.html ]; then
            echo "Coverage report available in htmlcov/index.html"
          fi

# ================================================================================
# RESUMEN: Cómo funciona este workflow en clase 6 (GitHub Actions)
# ================================================================================
# 1. Estudiante hace 'git push feature/new-api' → GitHub detecta push
# 2. GitHub Actions inicia 3 trabajos en paralelo (Python 3.9, 3.10, 3.11)
# 3. Cada uno: descarga código → configura Python → instala deps → corre tests
# 4. Si TODOS pasan: GitHub muestra badge VERDE en el PR
# 5. Si ALGUNO falla: GitHub muestra badge ROJO y bloquea el merge a main
# 6. Codecov comenta en el PR con datos de cobertura
# 7. El PR solo puede mergearse si CI pasa (calidad GARANTIZADA)
#
# BENEFICIO PEDAGÓGICO: Los estudiantes aprenden que "CI = Safety Net"
# que detecta bugs automáticamente antes de que afecten a usuarios.
# ===============================================================================
